version: "3.8"

services:
  psx-bot:
    build: .
    container_name: psx-trading-bot
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data_cache:/app/data_cache
    networks:
      - psx-network

  nginx:
    image: nginx:alpine
    container_name: psx-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - psx-bot
    networks:
      - psx-network

networks:
  psx-network:
    driver: bridge
